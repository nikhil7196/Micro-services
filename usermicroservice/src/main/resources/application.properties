spring.application.name=USERMICROSERVICE
server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

jwt.secret=mediserve-secret-key-123456789012345678901234
jwt.expiration=86400000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.usermicroservice=INFO
logging.level.org.springframework.security=WARN
logging.level.feign=INFO